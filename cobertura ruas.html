<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AUTOVISION — Rota</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--am:#F5C800;--bg:#0A0A0A;--panel:#111;--panel2:#161616;--border:#2A2A2A;--text:#E0E0E0;--muted:#555;--green:#4CAF50;--orange:#F5A623;--purple:#C084FC;--red:#FF4444;--cyan:#00CCCC}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

#hdr{background:var(--bg);border-bottom:1px solid var(--border);padding:7px 12px;flex-shrink:0}
#hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.logo{font-size:11px;letter-spacing:4px;color:var(--am);font-weight:bold}
.sub{font-size:8px;color:var(--muted);letter-spacing:2px}
#hdr-fields{display:flex;gap:7px}
.ig{display:flex;flex-direction:column;gap:2px;flex:1;min-width:55px}
.il{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
input{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:5px 7px;border-radius:2px;width:100%;outline:none}
input:focus{border-color:var(--am)}

#tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:9px 0;text-align:center;font-size:10px;letter-spacing:2px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase}
.tab.active{color:var(--am);border-bottom-color:var(--am);background:#0F0E00}

#tab-bairro,#tab-circuito{display:none;flex-direction:column;flex:1;overflow:hidden}
#tab-bairro.show,#tab-circuito.show{display:flex}

.trow{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:6px;align-items:center;flex-shrink:0;overflow-x:auto}

#search-row{background:var(--panel);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;gap:6px;flex-shrink:0}
#bairro-input,#cidade-input{background:var(--panel2);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:6px 8px;border-radius:2px;outline:none}
#bairro-input{flex:1}
#bairro-input:focus,#cidade-input:focus{border-color:var(--am)}
#cidade-input{width:120px}

#confirm-banner{display:none;background:#1A1500;border-bottom:1px solid #3A2A00;padding:8px 12px;flex-shrink:0;gap:8px;align-items:center}
#confirm-banner.show{display:flex}
#confirm-name{font-size:11px;color:var(--am);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* PRONTO BANNER */
#pronto-banner{display:none;background:#0A1A00;border-bottom:1px solid var(--green);padding:8px 12px;flex-shrink:0;gap:8px;align-items:center}
#pronto-banner.show{display:flex}
#pronto-info{font-size:11px;color:var(--green);flex:1}

.btn{background:var(--panel);border:1px solid var(--border);color:var(--muted);font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;padding:6px 10px;border-radius:2px;cursor:pointer;white-space:nowrap;transition:all .15s;text-transform:uppercase}
.btn.on{background:#1A1500;border-color:var(--am);color:var(--am)}
.btn.on-move{background:#001A1A;border-color:var(--cyan);color:var(--cyan)}
.btn.on-del{background:#1A0000;border-color:var(--red);color:var(--red)}
.btn.primary{background:var(--am);border-color:var(--am);color:#000;font-weight:bold}
.btn.green{background:#0A2A00;border-color:var(--green);color:var(--green);font-weight:bold}
.btn.confirm{background:#1A3A00;border-color:var(--green);color:var(--green)}
.btn.cancel{background:#1A0000;border-color:var(--red);color:var(--red)}
.btn.danger{border-color:#3A1010;color:#884444}
.btn.sm{padding:5px 8px;font-size:13px}
.btn.full{width:100%;font-size:11px;padding:9px}

.map-wrap{flex:1;position:relative;overflow:hidden}
#map-bairro,#map-circuito{height:100%;width:100%}

.statusbar{background:var(--panel);border-top:1px solid var(--border);padding:5px 10px;font-size:10px;color:var(--muted);letter-spacing:1px;flex-shrink:0;min-height:26px;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0}
.dot.g{background:var(--green);box-shadow:0 0 5px var(--green)}
.dot.y{background:var(--am);box-shadow:0 0 5px var(--am);animation:pulse 1s infinite}
.dot.r{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* RESULT — big and clean */
#result{display:none;background:var(--panel);border-top:2px solid var(--am);padding:12px;flex-shrink:0}
#result.show{display:block}
.result-main{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px}
.rl{font-size:8px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.rv{font-size:22px;font-weight:bold;color:var(--purple)}
.rv span{font-size:10px;color:var(--muted);margin-left:2px}
.rv.or{color:var(--orange)}
.verdict{background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:10px 12px;font-size:12px;color:var(--text);line-height:1.6;margin-bottom:8px}
.verdict strong{color:var(--am)}
.rtag{display:inline-block;font-size:9px;padding:2px 7px;border-radius:2px;letter-spacing:1px}
.rtag.real{background:#0A1F0A;border:1px solid #1A4A1A;color:var(--green)}
.rtag.est{background:#1A1200;border:1px solid #3A2A00;color:var(--orange)}

#export-row{display:none;padding:8px 12px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
#export-row.show{display:block}

.vx{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.6)}
.vx.am{background:var(--am)}
.vx.cy{background:var(--cyan);cursor:grab}
.vx.rd{background:var(--red);cursor:pointer}
.gps-dot{width:13px;height:13px;border-radius:50%;background:#4A90FF;border:2px solid #fff;box-shadow:0 0 7px #4A90FF}
#area-badge{font-size:9px;color:var(--muted);letter-spacing:1px}
</style>
</head>
<body>

<div id="hdr">
  <div id="hdr-top">
    <div><div class="logo">AUTOVISION</div><div class="sub">PLANEJADOR DE ROTA v3.1</div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <div id="area-badge"></div>
      <button class="btn sm" onclick="irGPS()">📍</button>
    </div>
  </div>
  <div id="hdr-fields">
    <div class="ig"><div class="il">Cliente</div><input type="text" id="iCliente" placeholder="Cliente"/></div>
    <div class="ig"><div class="il">Campanha</div><input type="text" id="iCampanha" placeholder="Campanha"/></div>
    <div class="ig" style="max-width:58px"><div class="il">Horas</div><input type="number" id="iHoras" value="3" min="0.5" max="12" step="0.5"/></div>
  </div>
</div>

<div id="tabs">
  <div class="tab active" id="tab-btn-bairro"   onclick="showTab('bairro')">▣ BAIRRO</div>
  <div class="tab"        id="tab-btn-circuito" onclick="showTab('circuito')">⟳ CIRCUITO</div>
</div>

<!-- ABA BAIRRO -->
<div id="tab-bairro" class="show">
  <div id="search-row">
    <input id="bairro-input" placeholder="Nome do bairro"/>
    <input id="cidade-input" placeholder="Cidade, UF" value="Porto Alegre, RS"/>
    <button class="btn" onclick="buscarBairro()">BUSCAR</button>
  </div>

  <div id="confirm-banner">
    <div id="confirm-name"></div>
    <button class="btn confirm" onclick="confirmarBairro()">✓ USAR</button>
    <button class="btn cancel"  onclick="rejeitarBairro()">✕</button>
  </div>

  <div class="trow">
    <button class="btn on" id="bBtnAdd"  onclick="setBMode('add')">✚ Adicionar</button>
    <button class="btn"    id="bBtnMove" onclick="setBMode('move')">✎ Mover</button>
    <button class="btn"    id="bBtnDel"  onclick="setBMode('del')">✕ Remover</button>
    <button class="btn danger"           onclick="limparBairro()">🗑</button>
  </div>

  <div class="map-wrap"><div id="map-bairro"></div></div>

  <div id="pronto-banner">
    <div id="pronto-info"></div>
    <button class="btn green" onclick="irParaCircuito()">▶ GERAR CIRCUITO</button>
  </div>

  <div class="statusbar">
    <div class="dot" id="bDot"></div>
    <span id="bSt">Busque um bairro para começar</span>
  </div>
</div>

<!-- ABA CIRCUITO -->
<div id="tab-circuito">
  <div class="trow">
    <div style="font-size:8px;color:var(--muted);letter-spacing:2px;white-space:nowrap">DENSIDADE</div>
    <button class="btn on" id="d1" onclick="setDensity(1)">🔵 Leve</button>
    <button class="btn"    id="d2" onclick="setDensity(2)">🟡 Médio</button>
    <button class="btn"    id="d3" onclick="setDensity(3)">🔴 Denso</button>
    <button class="btn primary" style="margin-left:auto" onclick="gerar()">▶ GERAR</button>
    <button class="btn danger"  onclick="limparCircuito()">🗑</button>
  </div>

  <div class="map-wrap"><div id="map-circuito"></div></div>

  <div class="statusbar">
    <div class="dot" id="cDot"></div>
    <span id="cSt">Defina o bairro e clique ▶ GERAR</span>
  </div>

  <div id="result">
    <div class="result-main">
      <div>
        <div class="rl">1 volta completa</div>
        <div class="rv" id="rKm">—<span>km</span></div>
        <div class="rv" id="rT" style="font-size:16px;margin-top:2px">—</div>
      </div>
      <div>
        <div class="rl" id="rHLabel">— h disponíveis</div>
        <div class="rv or" id="rVoltas">—<span>voltas</span></div>
        <div class="rv or" id="rTotalKm" style="font-size:16px;margin-top:2px">—<span>km cobertos</span></div>
      </div>
    </div>
    <div class="verdict" id="rVerdict"></div>
    <div id="rTag"></div>
  </div>

  <div id="export-row">
    <button class="btn full primary" onclick="exportGPX()">⬇ EXPORTAR GPX — STRAVA</button>
  </div>
</div>

<script>
const SPD = 15;

const mapB = L.map('map-bairro',  {zoomControl:true, attributionControl:false});
const mapC = L.map('map-circuito',{zoomControl:true, attributionControl:false});
const TILES='https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
L.tileLayer(TILES,{maxZoom:19}).addTo(mapB);
L.tileLayer(TILES,{maxZoom:19}).addTo(mapC);
mapB.setView([-30.05,-51.17],13);
mapC.setView([-30.05,-51.17],13);

let bPts=[],bMode='add',bPolyLayer=null,bVtx=[],gpsMkr=null;
let pendingGeojson=null,pendingName='';
let lastGeom=null;

// ── TABS ──────────────────────────────────────────────────────
function showTab(t){
  ['bairro','circuito'].forEach(n=>{
    document.getElementById('tab-'+n).classList.toggle('show',n===t);
    document.getElementById('tab-btn-'+n).classList.toggle('active',n===t);
  });
  setTimeout(()=>(t==='bairro'?mapB:mapC).invalidateSize(),60);
}

// ── STATUS ────────────────────────────────────────────────────
function bSt(msg,cls){document.getElementById('bSt').textContent=msg;document.getElementById('bDot').className='dot'+(cls?' '+cls:'');}
function cSt(msg,cls){document.getElementById('cSt').textContent=msg;document.getElementById('cDot').className='dot'+(cls?' '+cls:'');}

// ── AREA ──────────────────────────────────────────────────────
function polyAreaKm2(poly){
  if(poly.length<3)return 0;
  let area=0;const R=6371000;
  for(let i=0;i<poly.length;i++){
    const[la,lo]=poly[i],[lb,lp]=poly[(i+1)%poly.length];
    const y1=la*Math.PI/180*R,x1=lo*Math.PI/180*R*Math.cos(la*Math.PI/180);
    const y2=lb*Math.PI/180*R,x2=lp*Math.PI/180*R*Math.cos(lb*Math.PI/180);
    area+=x1*y2-x2*y1;
  }
  return Math.abs(area/2)/1e6;
}

function updateAreaBadge(){
  const a=bPts.length>=3?polyAreaKm2(bPts):0;
  document.getElementById('area-badge').textContent=a>0?`▣ ${a.toFixed(2)} km²`:'';
  // Mostra/esconde botão pronto
  if(a>0){
    document.getElementById('pronto-info').textContent=`${a.toFixed(2)} km² definidos`;
    document.getElementById('pronto-banner').classList.add('show');
  } else {
    document.getElementById('pronto-banner').classList.remove('show');
  }
}

function irParaCircuito(){
  showTab('circuito');
  gerar();
}

// ── GPS ───────────────────────────────────────────────────────
function irGPS(){
  if(!navigator.geolocation){bSt('GPS indisponível','r');return;}
  bSt('Obtendo localização...','y');
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    mapB.setView([lat,lng],15);mapC.setView([lat,lng],15);
    if(gpsMkr)mapB.removeLayer(gpsMkr);
    gpsMkr=L.marker([lat,lng],{icon:L.divIcon({className:'',html:'<div class="gps-dot"></div>',iconSize:[13,13],iconAnchor:[6,6]})}).addTo(mapB).bindPopup('📍 Você está aqui').openPopup();
    bSt('Localização encontrada','g');
  },()=>bSt('GPS indisponível','r'),{enableHighAccuracy:true,timeout:10000});
}

// ── BAIRRO ────────────────────────────────────────────────────
function setBMode(m){
  bMode=m;
  ['bBtnAdd','bBtnMove','bBtnDel'].forEach(id=>document.getElementById(id).className='btn');
  document.getElementById({add:'bBtnAdd',move:'bBtnMove',del:'bBtnDel'}[m]).className='btn '+{add:'on',move:'on-move',del:'on-del'}[m];
  bRedraw();
  bSt({add:'Toque no mapa para adicionar pontos',move:'Arraste um ponto para movê-lo',del:'Toque num ponto para removê-lo'}[m],'');
}

function bRedraw(){
  if(bPolyLayer)mapB.removeLayer(bPolyLayer);
  if(bPts.length>=3)bPolyLayer=L.polygon(bPts,{color:'#F5C800',weight:2,fillColor:'#F5C800',fillOpacity:0.07}).addTo(mapB);
  else if(bPts.length>=2)bPolyLayer=L.polyline(bPts,{color:'#F5C800',weight:2,dashArray:'5,4'}).addTo(mapB);
  else bPolyLayer=null;
  bVtx.forEach(m=>mapB.removeLayer(m));bVtx=[];
  bPts.forEach((pt,i)=>{
    const cls=bMode==='move'?'vx cy':bMode==='del'?'vx rd':'vx am';
    const mkr=L.marker(pt,{draggable:bMode==='move',icon:L.divIcon({className:'',html:`<div class="${cls}"></div>`,iconSize:[12,12],iconAnchor:[6,6]})}).addTo(mapB);
    mkr.on('dragend',()=>{bPts[i]=[mkr.getLatLng().lat,mkr.getLatLng().lng];bRedraw();updateAreaBadge();});
    mkr.on('click',e=>{if(bMode==='del'){L.DomEvent.stopPropagation(e);bPts.splice(i,1);bRedraw();updateAreaBadge();}});
    bVtx.push(mkr);
  });
  updateAreaBadge();
}

mapB.on('click',e=>{
  if(bMode!=='add')return;
  bPts.push([e.latlng.lat,e.latlng.lng]);
  bRedraw();
  bSt(`${bPts.length} pontos — continue ou clique ▶ GERAR CIRCUITO`,'');
});

function limparBairro(){
  bPts=[];
  if(bPolyLayer)mapB.removeLayer(bPolyLayer);
  bPolyLayer=null;bVtx.forEach(m=>mapB.removeLayer(m));bVtx=[];
  document.getElementById('confirm-banner').classList.remove('show');
  updateAreaBadge();
  bSt('Limpo','');setBMode('add');
}

// ── BUSCA ─────────────────────────────────────────────────────
async function buscarBairro(){
  const q=document.getElementById('bairro-input').value.trim();
  const c=document.getElementById('cidade-input').value.trim()||'Brasil';
  if(!q)return;
  bSt(`Buscando "${q}"...`,'y');
  document.getElementById('confirm-banner').classList.remove('show');
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q+', '+c)}&format=json&polygon_geojson=1&limit=5`,{headers:{'Accept-Language':'pt-BR','User-Agent':'AutovisionRoute/3.1'}});
    const data=await res.json();
    const item=data.find(d=>['suburb','neighbourhood','quarter','residential'].includes(d.type))||data[0];
    if(!item){bSt('Não encontrado — tente outro nome','r');return;}
    const bb=item.boundingbox;
    mapB.fitBounds([[+bb[0],+bb[2]],[+bb[1],+bb[3]]],{padding:[20,20]});
    pendingName=item.display_name.split(',').slice(0,2).join(',').trim();
    if(item.geojson&&(item.geojson.type==='Polygon'||item.geojson.type==='MultiPolygon')){
      pendingGeojson=item.geojson;
      document.getElementById('confirm-name').textContent=`"${pendingName}" — é esse?`;
      document.getElementById('confirm-banner').classList.add('show');
      bSt('Confirme o bairro encontrado','y');
    }else{
      bSt('Encontrado sem polígono — desenhe manualmente','');
    }
  }catch(e){bSt('Erro na busca','r');}
}
document.getElementById('bairro-input').addEventListener('keydown',e=>{if(e.key==='Enter')buscarBairro();});
document.getElementById('cidade-input').addEventListener('keydown',e=>{if(e.key==='Enter')buscarBairro();});

function confirmarBairro(){
  if(!pendingGeojson)return;
  let coords=pendingGeojson.type==='Polygon'?pendingGeojson.coordinates[0]:pendingGeojson.coordinates[0][0];
  const want=Math.min(28,Math.max(14,Math.floor(coords.length/4)));
  const step=Math.max(1,Math.floor(coords.length/want));
  bPts=coords.filter((_,i)=>i%step===0).map(c=>[c[1],c[0]]);
  if(bPts.length>1){const[f,l]=[bPts[0],bPts[bPts.length-1]];if(Math.abs(f[0]-l[0])<0.00001&&Math.abs(f[1]-l[1])<0.00001)bPts.pop();}
  bRedraw();
  document.getElementById('confirm-banner').classList.remove('show');
  bSt(`"${pendingName}" aplicado — ajuste se necessário`,'g');
  pendingGeojson=null;
}
function rejeitarBairro(){
  document.getElementById('confirm-banner').classList.remove('show');
  bSt('Rejeitado — tente outro nome','');
  pendingGeojson=null;
}

// ── DENSITY ───────────────────────────────────────────────────
let densityTarget=40; // número alvo de waypoints para OSRM trip
function setDensity(d){
  [1,2,3].forEach(i=>document.getElementById('d'+i).className='btn'+(i===d?' on':''));
  densityTarget=d===1?25:d===2?40:60;
  cSt({1:'Leve (~25 pts)',2:'Médio (~40 pts)',3:'Denso (~60 pts)'}[d]+' — clique ▶ GERAR','');
}

// ── GEOMETRY ──────────────────────────────────────────────────
function scanLine(poly,lat){
  const xs=[];
  for(let i=0;i<poly.length;i++){
    const[la,lo]=poly[i],[lb,lp]=poly[(i+1)%poly.length];
    if((la<=lat&&lat<lb)||(lb<=lat&&lat<la))xs.push(lo+(lat-la)/(lb-la)*(lp-lo));
  }
  return xs.sort((a,b)=>a-b);
}

// Grade controlada: gera exatamente N pontos bem distribuídos dentro do polígono
function gradeControlada(poly, n){
  const lats=poly.map(p=>p[0]);
  const[loLat,hiLat]=[Math.min(...lats),Math.max(...lats)];
  // Quantas linhas: sqrt(n) arredondado
  const nRows=Math.max(3,Math.round(Math.sqrt(n*1.5)));
  const stepLat=(hiLat-loLat)/nRows;
  const allPts=[];
  let ltr=true;
  for(let i=0;i<=nRows;i++){
    const lat=loLat+i*stepLat;
    const xs=scanLine(poly,lat);
    const row=[];
    for(let j=0;j<xs.length-1;j+=2){
      const nCols=Math.max(2,Math.round(n/nRows));
      const stepLon=(xs[j+1]-xs[j])/nCols;
      for(let k=0;k<=nCols;k++)row.push([lat,xs[j]+k*stepLon]);
    }
    if(row.length){if(!ltr)row.reverse();allPts.push(...row);ltr=!ltr;}
  }
  // Subsample para exatamente N pontos
  if(allPts.length<=n)return allPts;
  const step=Math.floor(allPts.length/n);
  return allPts.filter((_,i)=>i%step===0).slice(0,n);
}

function haversine(a,b){
  const R=6371000,dLat=(b[0]-a[0])*Math.PI/180,dLon=(b[1]-a[1])*Math.PI/180;
  const s=Math.sin(dLat/2)**2+Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function distH(pts){let d=0;for(let i=0;i<pts.length-1;i++)d+=haversine(pts[i],pts[i+1]);return d;}

function fmtT(h){
  const hh=Math.floor(h),mm=Math.round((h-hh)*60);
  if(mm===60)return`${hh+1}h00`;
  return hh>0?`${hh}h${String(mm).padStart(2,'0')}`:`${mm}min`;
}

// OSRM /trip — fecha circuito automaticamente, máx 100 pts
async function osrmTrip(pts){
  const coords=pts.map(p=>`${p[1].toFixed(6)},${p[0].toFixed(6)}`).join(';');
  const url=`https://router.project-osrm.org/trip/v1/driving/${coords}?roundtrip=true&source=first&overview=full&geometries=geojson`;
  const r=await fetch(url,{signal:AbortSignal.timeout(30000)});
  if(!r.ok)throw new Error('OSRM '+r.status);
  const d=await r.json();
  if(d.code!=='Ok')throw new Error(d.code);
  return{distM:d.trips[0].distance,geom:d.trips[0].geometry.coordinates.map(c=>[c[1],c[0]])};
}

// ── ANIMAÇÃO ──────────────────────────────────────────────────
function animateRoute(geomLL,onDone){
  // Limpa rota anterior
  mapC.eachLayer(l=>{if(l._isRoute||l._isStart)mapC.removeLayer(l);});

  const line=L.polyline([],{color:'#C084FC',weight:3,opacity:.9}).addTo(mapC);
  line._isRoute=true;
  lastGeom=geomLL;

  const total=geomLL.length;
  const step=Math.max(1,Math.floor(total/150));
  let i=0;
  function tick(){
    if(i>=total){if(onDone)onDone();return;}
    for(let k=0;k<step&&i<total;k++,i++)line.addLatLng(geomLL[i]);
    requestAnimationFrame(tick);
  }
  tick();
}

// ── GERAR ─────────────────────────────────────────────────────
async function gerar(){
  if(bPts.length<3){cSt('Defina o bairro na aba BAIRRO primeiro','r');showTab('bairro');return;}

  const horas=parseFloat(document.getElementById('iHoras').value)||3;
  const cliente=document.getElementById('iCliente').value||'—';
  const campanha=document.getElementById('iCampanha').value||'—';
  const areaKm2=polyAreaKm2(bPts);

  // Sincroniza mapa
  const bounds=L.latLngBounds(bPts.map(p=>L.latLng(p[0],p[1])));
  mapC.fitBounds(bounds,{padding:[20,20]});

  // Perímetro de referência
  mapC.eachLayer(l=>{if(l._isPerim)mapC.removeLayer(l);});
  const perim=L.polygon(bPts,{color:'#F5C800',weight:1.5,fillColor:'#F5C800',fillOpacity:0.05,dashArray:'4,4'}).addTo(mapC);
  perim._isPerim=true;

  cSt(`Calculando grade (${densityTarget} pts)...`,'y');

  // Grade controlada com número alvo de pontos
  const waypoints=gradeControlada(bPts,densityTarget);
  if(waypoints.length<3){cSt('Área muito pequena','r');return;}

  cSt(`Calculando circuito via ruas reais (${waypoints.length} pts)...`,'y');

  let geomLL,viaRua=true,distM;
  try{
    const r=await osrmTrip(waypoints);
    distM=r.distM;
    geomLL=r.geom.map(p=>L.latLng(p[0],p[1]));
  }catch(e){
    console.error(e);
    viaRua=false;
    // fallback: haversine em ordem
    const pts=[...waypoints,waypoints[0]];
    distM=distH(pts);
    geomLL=pts.map(p=>L.latLng(p[0],p[1]));
  }

  // Ponto de início
  mapC.eachLayer(l=>{if(l._isStart)mapC.removeLayer(l);});
  const startMkr=L.circleMarker(geomLL[0],{radius:8,color:'#F5C800',fillColor:'#F5C800',fillOpacity:1,weight:2}).addTo(mapC).bindPopup('▶ INÍCIO / FIM');
  startMkr._isStart=true;

  cSt('Desenhando circuito...','y');

  animateRoute(geomLL,()=>{
    const voltaKm=viaRua?(distM/1000):(distH(waypoints.map(p=>[p[0],p[1]]))/1000);
    const voltaHr=voltaKm/SPD;
    const voltas=Math.floor(horas/voltaHr);
    const totalKm=(voltas*voltaKm).toFixed(1);

    document.getElementById('rKm').innerHTML=`${voltaKm.toFixed(1)}<span>km</span>`;
    document.getElementById('rT').innerHTML=fmtT(voltaHr);
    document.getElementById('rHLabel').textContent=`${horas}h disponíveis`;
    document.getElementById('rVoltas').innerHTML=`${voltas}<span>volta${voltas!==1?'s':''}</span>`;
    document.getElementById('rTotalKm').innerHTML=`${totalKm}<span>km cobertos</span>`;

    // Veredito simples
    const pct=Math.min(100,Math.round((voltaKm/(areaKm2*12))*100));
    document.getElementById('rVerdict').innerHTML=
      `<strong>${cliente||'Campanha'} · ${campanha}</strong><br>`+
      `Em <strong>${horas}h</strong> você consegue dar <strong>${voltas} volta${voltas!==1?'s':''}</strong> completa${voltas!==1?'s':''} pelo bairro.<br>`+
      `Cobertura estimada: <strong>~${pct}% das ruas</strong> a cada passagem.`;

    document.getElementById('rTag').innerHTML=`<span class="rtag ${viaRua?'real':'est'}">${viaRua?'🛣 VIA RUAS REAIS':'≈ ESTIMATIVA'}</span>`;
    document.getElementById('result').classList.add('show');
    document.getElementById('export-row').classList.add('show');
    cSt(`${voltaKm.toFixed(1)}km por volta · ${fmtT(voltaHr)} · ${voltas} volta${voltas!==1?'s':''} em ${horas}h`,'g');
  });
}

// ── LIMPAR CIRCUITO ───────────────────────────────────────────
function limparCircuito(){
  mapC.eachLayer(l=>{if(l._isRoute||l._isStart||l._isPerim)mapC.removeLayer(l);});
  lastGeom=null;
  document.getElementById('result').classList.remove('show');
  document.getElementById('export-row').classList.remove('show');
  cSt('Limpo','');
}

// ── EXPORT GPX ────────────────────────────────────────────────
function exportGPX(){
  if(!lastGeom||!lastGeom.length){cSt('Gere a rota primeiro','r');return;}
  const cliente=document.getElementById('iCliente').value||'rota';
  const campanha=document.getElementById('iCampanha').value||'campanha';
  const name=`${cliente} — ${campanha}`;
  const startMs=Date.now();
  const pts=lastGeom.map(p=>[p.lat,p.lng]);
  const totalKm=distH(pts)/1000;
  const totalSec=(totalKm/SPD)*3600;
  const msPerPt=(totalSec*1000)/pts.length;
  let trkpts='';
  pts.forEach((pt,i)=>{
    const t=new Date(startMs+i*msPerPt).toISOString();
    trkpts+=`      <trkpt lat="${pt[0].toFixed(6)}" lon="${pt[1].toFixed(6)}">\n        <time>${t}</time>\n      </trkpt>\n`;
  });
  const gpx=`<?xml version="1.0" encoding="UTF-8"?>\n<gpx version="1.1" creator="AUTOVISION" xmlns="http://www.topografix.com/GPX/1/1">\n  <metadata><name>${name}</name><time>${new Date(startMs).toISOString()}</time></metadata>\n  <trk><name>${name}</name><trkseg>\n${trkpts}  </trkseg></trk>\n</gpx>`;
  const blob=new Blob([gpx],{type:'application/gpx+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`autovision-${cliente}-${campanha}.gpx`.replace(/\s+/g,'-').toLowerCase();
  a.click();URL.revokeObjectURL(url);
  cSt('GPX exportado — importe em strava.com/upload','g');
}
